    <style>
        :root {
            --bg: #000000;
            --text: #ccc;
            --text-main: #e0e0e0;
            --text-light: #888;
            --highlight-bg: #2a2a2a;
            --highlight-border: #3a3a3a;
        }

        @font-face {
            font-family: 'custom_mono';

        * {

        body {
            background-color: var(--bg);
            color: var(--text);

            font-size: 16px;
            line-height: 1.7;
            margin: 0;
            display: flex;
            padding: 3rem;
        }

        a {
            color: var(--text);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            transition: color 0.2s ease-in-out;
        }

        a:hover {

        }

        .sidebar {
            width: 150px;
            flex-shrink: 0;
            padding-right: 2rem;
        }

        .sidebar-nav a {
            display: block;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .sidebar-nav a:before {
            content: '>';
            margin-right: 0.75rem;
            color: var(--text-light);
        }

        .main-content {
            width: 100%;
            padding-right: 260px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        header .logo {
            font-weight: bold;
        }

        .intro .highlight {
            background-color: var(--highlight-bg);
            border: 1px solid var(--highlight-border);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            margin: 0 2px;
        }

        .intro p {
            max-width: 600px;
            margin-bottom: 2rem;
        }

        .quick-links a {
            margin-right: 1.5rem;
        }

        .content-section {
            margin-top: 4rem;
        }

        .content-section h2 {
            font-weight: normal;
            font-size: 1em;
            margin-bottom: 2rem;
        }

        .item-list {
            max-width: 750px;
        }

        .list-item {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: flex-start;
        }

        .list-item .name {
            width: 150px;
            flex-shrink: 0;
            color: var(--text-main);
        }

        .list-item .desc {
            color: var(--text-light);
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .image-gallery img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid var(--highlight-border);
        }

        .side-widget {
            position: fixed;
            top: 3rem;
            right: 3rem;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .side-widget .tenor-gif-embed {
            border: 1px solid var(--highlight-border);
        }

        @media (max-width: 1024px) {
            .side-widget {
                position: relative;
                top: auto;
                right: auto;
                width: 100%;
                margin-top: 4rem;
                flex-direction: row;
                justify-content: center;
            }

            .side-widget .tenor-gif-embed {
                max-width: 45%;
            }

            .main-content {
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding: 1.5rem;
            }

            .sidebar {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                margin-bottom: 2rem;
            }

            .sidebar-nav a {
                margin-right: 1.5rem;
                margin-bottom: 0.5rem;
            }
        }

        .image-popup {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            z-index: 1000;
            max-width: 320px;
            max-height: 240px;
            border-radius: 6px;
            border: 1px solid var(--highlight-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .image-popup.visible {
            opacity: 1;
        }

        .image-popup img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            display: block;
        }

        .hover-img {
            cursor: help;
            border-bottom: 1px dashed var(--text-light);
        }
    </style>

    <div class="image-popup" id="imagePopup">
        <img src="" alt="Preview" id="popupImage">
    </div>

    <script>
        const popup = document.getElementById('imagePopup');
        const popupImg = document.getElementById('popupImage');
        
        const hoverTargets = document.querySelectorAll('.hover-img');
        
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', (e) => {
                const imgSrc = target.getAttribute('data-img');
                if (imgSrc) {
                    popupImg.src = imgSrc;
                    popup.classList.add('visible');
                }
            });
            
            target.addEventListener('mousemove', (e) => {
                const offsetX = 20;
                const offsetY = 20;
                let x = e.clientX + offsetX;
                let y = e.clientY + offsetY;
                
                const rect = popup.getBoundingClientRect();
                if (x + rect.width > window.innerWidth) {
                    x = e.clientX - rect.width - offsetX;
                }
                if (y + rect.height > window.innerHeight) {
                    y = e.clientY - rect.height - offsetY;
                }
                
                popup.style.left = x + 'px';
                popup.style.top = y + 'px';
            });
            
            target.addEventListener('mouseleave', () => {
                popup.classList.remove('visible');
            });
        });
    </script>
